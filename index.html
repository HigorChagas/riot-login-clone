<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://kit.fontawesome.com/00034484cc.js" crossorigin="anonymous"></script>
    <title>Iniciar Sessão</title>
</head>
<body>
    <div class="logo">
        <img src="/imgs/logo.png" alt="Logo" class="logo-img">
    </div>
    <div class="flex-container">
        <div class="container">
            <h5 class="form-title">Iniciar sessão</h5>
            <div class="form-group">
                <input class="form-input" type="text" name="login" id="login" placeholder="nome de usuário">
                <input class="form-input" type="password" name="password" id="password" placeholder="senha">
            </div>
            <div class="social-media-group">
                <button class="social-buttons"><i class="fa-brands fa-facebook"></i></button>
                <button class="social-buttons"><i class="fa-brands fa-google"></i></button>
                <button class="social-buttons"><i class="fa-brands fa-apple"></i></button>
                <button class="social-buttons"><i class="fa-brands fa-xbox"></i></i></button>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" name="keep-login" id="checkbox-login" class="login-checkbox">
                <span class="checkbox-span">Manter login</span>
            </div>
            <div class="btn-container">
                <button type="submit" class="btn-login"><i class="fa-solid fa-arrow-right"></i></button>
            </div> 
            <div class="link-container">
                <a href="" class="links">Não consegue fazer login?</a>
                <a href="" class="links">Criar conta</a>
            </div>
        </div>
        <footer class="footer-container">
            <a href="" class="footer-link">Suporte</a>
            <a href="" class="footer-link">Aviso de privacidade</a>
            <a href="" class="footer-link">Termos de serviço</a>
            <a href="" class="footer-link">Preferências de cookies</a>
            <div class="copyright-container">
                <p class="footer-copyright">© 2020 Riot Games. Todos os direitos reservados.</p>
            </div>
        </footer>
    </div>
</body>
</html>
